colourful: true

# chadracula-evondev for eza
# Palette source: NvChad/base46 chadracula-evondev
# Structure: eza-community/eza-themes

filekinds:
  normal: { foreground: "#E9E9F4" }
  directory: { foreground: "#9A86FD", is_bold: true }
  symlink: { foreground: "#2CCCFF", is_bold: true }
  pipe: { foreground: "#6060A4" }
  block_device: { foreground: "#FF5555", is_bold: true }
  char_device: { foreground: "#FF5555", is_bold: true }
  socket: { foreground: "#2D2D4E" }
  special: { foreground: "#FF6BCB" }
  executable: { foreground: "#20E3B2", is_bold: true }
